databases:
  - name: uems-db
    plan: free
    databaseName: uems
    user: uems_user

services:
  - type: web
    name: uems-backend
    runtime: java
    region: oregon
    branch: main
    rootDir: backend
    buildCommand: ./mvnw clean package -DskipTests -B
    startCommand: java -jar target/api-0.0.1-SNAPSHOT.jar
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: uems-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: uems-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: uems-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: SERVER_PORT
        value: "8080"
      - key: JAVA_VERSION
        value: "17"

  - type: web
    name: uems-frontend
    runtime: static
    region: oregon
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://uems-backend.onrender.com/api
      - key: NODE_VERSION
        value: "18"
