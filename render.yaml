databases:
  - name: uems-db
    plan: free
    databaseName: uems
    user: uems_user

services:
  - type: web
    name: uems-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: uems-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: uems-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: uems-db
          property: password
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: uems-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://uems-backend.onrender.com/api
