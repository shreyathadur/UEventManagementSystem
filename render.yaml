databases:
  - name: uems-db
    plan: free
    databaseName: uems
    user: uems_user

services:
  - type: web
    name: uems-backend
    runtime: docker
    region: oregon
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: uems-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: uems-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: uems-db
          property: name
      - key: DB_USER
        fromDatabase:
          name: uems-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: uems-db
          property: password
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: uems-frontend
    runtime: static
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://uems-backend.onrender.com/api
      - key: NODE_VERSION
        value: "20"
