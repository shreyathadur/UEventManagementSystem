spring:
  application:
    name: uems-backend
  datasource:
    # Construct JDBC URL from individual env vars (works for both Render and local)
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:uems}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Render sets PORT env var (default 10000); locally use 8080
server:
  port: ${PORT:8080}

# Application-specific Custom Properties
app:
  jwt:
    secret: ${JWT_SECRET:9a4f2c8d3b7a1e5f8g9h0i1j2k3l4m5n6o7p8q9r0s1t2u3v4w5x6y7z8A9B0C1D}
    expiration-ms: 86400000

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
