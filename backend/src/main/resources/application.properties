spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}
spring.application.name=uems-backend

# Connection string - DATABASE_URL now has jdbc: prefix
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA (remove hibernate.dialect - auto-selected for PostgreSQL)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server
server.port=${SERVER_PORT:8080}

# JWT
app.jwt.secret=${JWT_SECRET:9a4f2c8d3b7a1e5f8g9h0i1j2k3l4m5n6o7p8q9r0s1t2u3v4w5x6y7z8A9B0C1D}
app.jwt.expiration-ms=86400000

# Logging
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO

# Antigravity
antigravity.api.url=https://api.antigravity.service
antigravity.api.key=${ANTIGRAVITY_API_KEY:}

# CORS - allow both localhost and Render frontend
spring.cors.allowed-origins=http://localhost:5173,https://uems-frontend-lo0h.onrender.com
spring.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cors.allowedheaders=*
spring.cors.allow-all-requests=true
