spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}
spring.application.name=uems-backend

# Connection string - DATABASE_URL now has jdbc: prefix
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA (remove hibernate.dialect - auto-selected for PostgreSQL)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server
server.port=${PORT:8080}

# Actuator Endpoints Exposure
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# Logging
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO

# Antigravity
antigravity.api.url=https://api.antigravity.service
antigravity.api.key=${ANTIGRAVITY_API_KEY:}

# CORS - allow both localhost and Render frontend
spring.cors.allowed-origins=http://localhost:5173,https://uems-frontend-lo0h.onrender.com
spring.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cors.allowedheaders=*
spring.cors.allow-all-requests=true
